name: 'Deploy to Cloud Run from Source'

on:
  push:
    branches:
      - 'development'

env:
  PROJECT_ID: 'blissful-racer-381313'
  REGION: 'us-central1'
  SERVICE: 'moowee-server'
  NODE_ENV: 'production'
  PORT: '4000'

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:

#============================Add Config File============================#

      - name: 'Checkout Config Repo'
        uses: 'actions/checkout@v4'
        with:
          repository: '${{ vars.CONFIG_REPO }}'
          token: '${{ secrets.PAT }}'
          path: 'moowee'

      - name: 'Copy Config'
        run: cp config.json ./config.json

#============================Cloud Authentication============================#

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ vars.WORKLOAD_IDEN_PROVIDER }}'
          service_account: '${{ vars.SERV_ACC }}'

#============================Docker Auth with Cloud Run============================#

      - name: 'Docker Auth'
        uses: 'docker/login-action@v3'
        with:
          registry: 'gcr.io'
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

#============================Build & Push Docker Image to Cloud Run============================#

      - name: 'Build and Push Docker image'
        run: |
          echo "Building docker image..."
          docker build -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:v1 -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:latest .
          echo "Docker image built successfully"
          echo "Pushing docker image to Google Cloud Registry..."
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:latest
        # docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:v1

      # - name: 'Set Image Name'
      #   run: |
      #     echo "IMAGE_NAME=gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:$(date +%s)" >> $GITHUB_ENV

#============================Deployment============================#

      - id: 'deploy'
        name: 'Deploy Docker image to Cloud Run'
        run: |
          echo "Deploying docker image to Cloud Run..."
          gcloud run deploy ${{ env.SERVICE }} \
              --image=gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:latest \
              --region=${{ env.REGION }} \
              --min-instances 0 \
              --max-instances 1 \
              --port ${{ env.PORT }}
              --platform managed \
              --allow-unauthenticated \
              --set-env-vars NODE_ENV=${{ env.NODE_ENV }} \
              --update-secrets=MONGO_URL=MONGO_URL:latest
          echo "Docker image deployed to Cloud Run successfully"

#============================Revisions Cleanup============================#
      
      - name: 'Cleanup Old Revisions'
        run: |
          chmod +x .github/workflows/cleanup-cloud-run-revisions.sh
          ./.github/workflows/cleanup-cloud-run-revisions.sh
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          REGION: ${{ env.REGION }}
          SERVICES: "moowee-server"

#============================Finish============================#

      - name: 'Show output'
        run: |
          echo ${{ steps.deploy.outputs.url }}
